name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # node:sqlite is flag-gated on the 22.x/23.x lines; it is only available
          # unflagged from Node 24 (the version Electron 42 bundles, per ADR-0002).
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      # Electron 42 has no postinstall script; its binary downloads lazily on
      # first launch, which races and fails under Playwright in CI (missing
      # node_modules/electron/path.txt). Fetch it deterministically up front.
      - name: Install Electron binary
        run: node node_modules/electron/install.js

      # test:e2e builds the app then launches real Electron via Playwright, so it
      # needs a display — run it under xvfb (preinstalled on ubuntu runners).
      - name: E2E tests (Playwright + Electron)
        run: xvfb-run -a npm run test:e2e
