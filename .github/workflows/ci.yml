name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the engines.node floor; node:sqlite (>=22.5) ships in this line.
          node-version: "22.12.0"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      # test:e2e builds the app then launches real Electron via Playwright, so it
      # needs a display — run it under xvfb (preinstalled on ubuntu runners).
      - name: E2E tests (Playwright + Electron)
        run: xvfb-run -a npm run test:e2e
